services:
  web:
    image: nginx:alpine
    depends_on:
      - stt-service
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  stt-service:
    build: stt-service
    ports:
      - "8001:8001"
    environment:
      STT_MODEL_PATH: /models/ggml-large-v3.bin
    volumes:
      - whisper-models:/models
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    #  - render

volumes:
  whisper-models:
